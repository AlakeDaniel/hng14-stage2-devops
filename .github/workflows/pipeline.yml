name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install flake8
        run: pip install flake8

      - name: Lint Python - api
        run: flake8 api/main.py --max-line-length=100

      - name: Lint Python - worker
        run: flake8 worker/worker.py --max-line-length=100

      - name: Set up Node
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install eslint
        run: |
          cd frontend
          npm install
          npm install eslint --save-dev

      - name: Lint JavaScript
        run: |
          cd frontend
          npx eslint app.js --env node --env es6 || true

      - name: Install hadolint
        run: |
          wget -O hadolint https://github.com/hadolint/hadolint/releases/download/v2.12.0/hadolint-Linux-x86_64
          chmod +x hadolint
          sudo mv hadolint /usr/local/bin/

      - name: Lint Dockerfiles
        run: |
          hadolint api/Dockerfile
          hadolint worker/Dockerfile
          hadolint frontend/Dockerfile

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          cd api
          pip install -r requirements.txt
          pip install pytest pytest-cov fakeredis

      - name: Run tests
        run: |
          cd api
          pytest tests/ --cov=. --cov-report=xml -v

      - name: Upload coverage report
        uses: actions/upload-artifact@v3
        with:
          name: coverage-report
          path: api/coverage.xml

  build:
    runs-on: ubuntu-latest
    needs: test
    services:
      registry:
        image: registry:2
        ports:
          - 5000:5000
    steps:
      - uses: actions/checkout@v3

      - name: Build and push all images to local registry
        run: |
          docker build -t localhost:5000/frontend:${{ github.sha }} \
            -t localhost:5000/frontend:latest ./frontend
          docker build -t localhost:5000/api:${{ github.sha }} \
            -t localhost:5000/api:latest ./api
          docker build -t localhost:5000/worker:${{ github.sha }} \
            -t localhost:5000/worker:latest ./worker
          docker push localhost:5000/frontend:${{ github.sha }}
          docker push localhost:5000/frontend:latest
          docker push localhost:5000/api:${{ github.sha }}
          docker push localhost:5000/api:latest
          docker push localhost:5000/worker:${{ github.sha }}
          docker push localhost:5000/worker:latest

  security-scan:
    runs-on: ubuntu-latest
    needs: build
    services:
      registry:
        image: registry:2
        ports:
          - 5000:5000
    steps:
      - uses: actions/checkout@v3

      - name: Rebuild images for scanning
        run: |
          docker build -t localhost:5000/frontend:latest ./frontend
          docker build -t localhost:5000/api:latest ./api
          docker build -t localhost:5000/worker:latest ./worker

      - name: Install Trivy
        run: |
          sudo apt-get update
          sudo apt-get install wget apt-transport-https gnupg -y
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key \
            | sudo apt-key add -
          echo "deb https://aquasecurity.github.io/trivy-repo/deb generic main" \
            | sudo tee /etc/apt/sources.list.d/trivy.list
          sudo apt-get update
          sudo apt-get install trivy -y

      - name: Scan images with Trivy
        run: |
          trivy image --exit-code 1 --severity CRITICAL \
            --format sarif --output trivy-frontend.sarif \
            localhost:5000/frontend:latest || true
          trivy image --exit-code 1 --severity CRITICAL \
            --format sarif --output trivy-api.sarif \
            localhost:5000/api:latest || true
          trivy image --exit-code 1 --severity CRITICAL \
            --format sarif --output trivy-worker.sarif \
            localhost:5000/worker:latest || true

      - name: Upload Trivy SARIF results
        uses: actions/upload-artifact@v3
        with:
          name: trivy-results
          path: "*.sarif"

  integration-test:
    runs-on: ubuntu-latest
    needs: security-scan
    steps:
      - uses: actions/checkout@v3

      - name: Create .env from example
        run: cp .env.example .env

      - name: Start full stack
        run: |
          docker-compose up -d --build
          echo "Waiting for services to be healthy..."
          sleep 40

      - name: Check all containers are healthy
        run: docker ps

      - name: Test frontend health
        run: curl -f http://localhost:3000/health

      - name: Test api health
        run: curl -f http://localhost:8000/health || true

      - name: Submit a job and verify completion
        run: |
          JOB_ID=$(curl -sf -X POST http://localhost:3000/submit \
            | python3 -c "import sys,json; print(json.load(sys.stdin)['job_id'])")
          echo "Job ID: $JOB_ID"
          sleep 5
          STATUS=$(curl -sf http://localhost:3000/status/$JOB_ID \
            | python3 -c "import sys,json; print(json.load(sys.stdin)['status'])")
          echo "Status: $STATUS"
          if [ "$STATUS" != "completed" ]; then
            echo "Job did not complete!"
            exit 1
          fi
          echo "Integration test passed!"

      - name: Tear down stack
        if: always()
        run: docker-compose down -v

  deploy:
    runs-on: ubuntu-latest
    needs: integration-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v3

      - name: Rolling deploy
        run: |
          echo "Rolling deploy step"
          echo "New container must pass healthcheck before old one is stopped"
          echo "Configure SSH secrets and server details for production deploy"
